{% extends "app.html" %}

{% block title %}{{ title }}{% endblock %}

{% block body %}
<div class="container mx-auto max-w-6xl px-4 py-6 text-white">
    <header class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:gap-6">
            <a href="/" class="inline-flex items-center gap-3">
                <img src="https://s3.rottigni.tech/public/github/graphium_logo.png" alt="graphium" width="150px" />
            </a>
            <nav class="flex flex-wrap items-center gap-4 text-sm font-semibold">
                <a href="/" class="{% if active == "home" %}text-white{% else %}text-light hover:text-white{% endif %}">Home</a>
                <a href="/dashboard"
                    class="{% if active == "dashboard" %}text-white{% else %}text-light hover:text-white{% endif %}">Dashboard</a>
                <a href="/tests"
                    class="{% if active == "tests" %}text-white{% else %}text-light hover:text-white{% endif %}">Tests</a>
            </nav>
        </div>
        <div class="flex flex-wrap items-center gap-3">
            {% block header_right %}{% endblock %}
            <div id="loading" class="text-light text-sm">Loading…</div>
        </div>
    </header>

    <main class="mt-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-10 text-center text-xs text-light">
        <small>Graphium UI</small>
    </footer>
</div>
{% endblock %}
