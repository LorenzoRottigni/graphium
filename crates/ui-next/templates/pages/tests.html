{% extends "layouts/shell.html" %}

{% block content %}
<section class="border border-dark rounded-md p-4 bg-darkest">
    <h2 class="text-xl font-semibold mb-3">Tests</h2>
    {% if tests.is_empty() %}
    <p class="text-light text-sm">No tests registered.</p>
    {% else %}
    <div class="flex flex-col gap-2">
        {% for test in tests %}
        <div class="flex items-center justify-between border border-dark rounded-md px-3 py-2">
            <div class="text-sm">
                <div class="text-light">{{ test.kind }}</div>
                <div class="font-semibold">{{ test.name }}</div>
                <div class="text-light">{{ test.target }}</div>
            </div>
            <a class="text-primary hover:underline" href="/tests/run/{{ test.id }}">Run</a>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</section>
{% endblock %}
