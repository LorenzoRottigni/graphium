<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>{% block title %}Graphium App{% endblock %}</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'black': '#0b0b0c',
                        'darkest': '#121214',
                        'dark': '#2a2a2f',
                        'primary': '#f97316',
                        'light': '#9ca3af',
                    },
                },
            },
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            button {
                @apply bg-primary text-darkest px-4 py-2 rounded-md font-bold text-white hover:bg-primary/80 transition-colors disabled:bg-primary/50 disabled:cursor-not-allowed disabled:opacity-50;
            }
            select {
                @apply px-3 py-2 rounded-md bg-dark border-light focus:border-primary focus:ring focus:ring-primary/50 text-white;
            }
        }
        @layer utilities {
            .widget {
                @apply border-4 border-double border-primary/50 rounded-md p-4 text-white gap-4 flex flex-col rounded-md shadow-md;
            }
            #loading {
                display: none;
            }
            .htmx-request#loading {
                display: block;
            }
        }
    </style>

    <!-- Highlight.js -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
    <script>
        window.__graphiumHighlight = () => {
            try {
                if (!window.hljs) return;
                document.querySelectorAll('pre code').forEach((el) => {
                    window.hljs.highlightElement(el);
                });
            } catch (_) { }
        };
        document.addEventListener('DOMContentLoaded', function () {
            if (window.__graphiumHighlight) window.__graphiumHighlight();
        });
        document.addEventListener('htmx:afterSwap', function () {
            if (window.__graphiumHighlight) window.__graphiumHighlight();
        });
    </script>

    {% block head %}{% endblock %}
</head>

<body class="bg-[radial-gradient(1200px_600px_at_50%_0%,rgba(249,115,22,0.14),transparent_55%)] bg-black">
    {% block body %}{% endblock %}
</body>

</html>
