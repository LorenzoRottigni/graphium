<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>{% block title %}Graphium App{% endblock %}</title>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'black': '#0b0b0c',
                        'darkest': '#121214',
                        'dark': '#2a2a2f',
                        'primary': '#f97316',
                        'light': '#9ca3af',
                    },
                },
            },
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            button {
                @apply bg-primary text-darkest px-4 py-2 rounded-md font-bold text-white hover:bg-primary/80 transition-colors disabled:bg-primary/50 disabled:cursor-not-allowed disabled:opacity-50;
            }
            select {
                @apply px-3 py-2 rounded-md bg-dark border-light focus:border-primary focus:ring focus:ring-primary/50 text-white;
            }
        }
        @layer utilities {
            .widget {
                @apply border-4 border-double border-primary/50 rounded-md p-4 text-white gap-4 flex flex-col rounded-md shadow-md;
            }
            .scrollbar-primary::-webkit-scrollbar {
                @apply h-2;
            }

            .scrollbar-primary::-webkit-scrollbar-track {
                @apply bg-dark;
            }

            .scrollbar-primary::-webkit-scrollbar-thumb {
                @apply bg-primary rounded-full;
            }
            #loading {
                @apply hidden;
            }
            .htmx-request#loading {
                @apply block;
            }

            /* Mermaid flowcharts (Graph structure) */
            pre.mermaid {
                @apply text-white;
            }
            .mermaid svg {
                background-color: rgba(18, 18, 20, 0.6); /* darkest @ 60% */
                border: 1px solid #2a2a2f;
                border-radius: 0.5rem;
            }
            .mermaid svg .edgePath path {
                stroke-linecap: round;
                stroke-linejoin: round;
            }
            .mermaid svg .edgeLabel {
                color: #e5e7eb;
            }
            .mermaid svg .edgeLabel rect {
                fill: rgba(11, 11, 12, 0.85);
            }
            .mermaid svg .node rect,
            .mermaid svg .node polygon {
                transition: stroke 150ms ease, filter 150ms ease;
            }
            .mermaid svg .node:hover rect,
            .mermaid svg .node:hover polygon {
                stroke: #f97316;
            }
            .mermaid svg g.node.graphRoot {
                filter: drop-shadow(0px 0px 8px rgba(249, 115, 22, 0.25));
            }
            .mermaid svg g.node.stepNodeCtxRef {
                filter: drop-shadow(0px 0px 8px rgba(99, 102, 241, 0.35));
            }
            .mermaid svg g.node.stepNodeCtxMut {
                filter: drop-shadow(0px 0px 8px rgba(239, 68, 68, 0.35));
            }
        }
    </style>

    <!-- Highlight.js -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
    <script>
        window.__graphiumHighlight = () => {
            try {
                if (!window.hljs) return;
                document.querySelectorAll('pre code').forEach((el) => {
                    window.hljs.highlightElement(el);
                });
            } catch (_) { }
        };
        document.addEventListener('DOMContentLoaded', function () {
            if (window.__graphiumHighlight) window.__graphiumHighlight();
        });
        document.addEventListener('htmx:afterSwap', function () {
            if (window.__graphiumHighlight) window.__graphiumHighlight();
        });
    </script>

    {% block head %}{% endblock %}
</head>

<body class="bg-black">
    {% block body %}{% endblock %}
</body>

</html>
